# Fly.io deploy descriptor for the Match Service (Colyseus, realtime WebSocket).
# App name and region are placeholders the operator sets at provisioning time
# (see infra/README.md). Secrets are supplied via `fly secrets`, never here.
app = "meldrank-match"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "2567"

[http_service]
  internal_port = 2567
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
