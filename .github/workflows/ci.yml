name: CI

on:
  pull_request:
  push:
    branches: [main]

# Checks only — this workflow never deploys.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        # Version is taken from the root package.json "packageManager" field.
        uses: pnpm/action-setup@v4

      - name: Setup Node 22 (with pnpm store cache)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Check .env.example agrees with the schema
        run: pnpm env:check

      - name: Lint, typecheck, test, build
        # better-tailwindcss/enforce-canonical-classes runs a synckit worker that
        # loads Tailwind v4; on cold CI runs the worker can exceed synckit's
        # default wait and crash ESLint with "Atomics.wait() failed: timed-out".
        # Give the worker a generous ceiling so the first (uncached) lint succeeds.
        env:
          SYNCKIT_TIMEOUT: 60000
        run: pnpm turbo run lint typecheck test build
